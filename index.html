<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>IPC JSON Viewer</title>
    <style>
        body {
            font-family: Consolas, monospace;
            background: #1e1e1e;
            color: #dcdcdc;
            margin: 0;
            padding: 20px;
        }

        #log {
            white-space: pre-wrap;
            background: #252526;
            padding: 10px;
            border-radius: 5px;
            overflow-y: auto;
            height: 90vh;
            border: 1px solid #333;
        }

        .key {
            color: #9cdcfe;
        }

        .string {
            color: #ce9178;
        }

        .number {
            color: #b5cea8;
        }

        .bool {
            color: #569cd6;
        }

        .null {
            color: #569cd6;
        }
    </style>
</head>

<body>

    <h2>IPC JSON Viewer</h2>
    <div id="log"></div>

    <script>
        // JSON を色付けする関数
        function syntaxHighlight(json) {
            json = json.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^ u] | [^\\"])*"(\s *: ) ?|\b(true | false | null) \b | -?\d + (?: \.\d *) ? (?: [eE][+\-]?\d +)?)/g,
            function (match) {
                let cls = "number";
                if (/^"/.test(match)) {
                    cls = /:$/.test(match) ? "key" : "string";
                } else if (/true|false/.test(match)) {
                    cls = "bool";
                } else if (/null/.test(match)) {
                    cls = "null";
                }
                return `<span class="${cls}">${match}</span>`;
            }
    );
        }

        const log = document.getElementById("log");

        function appendJSON(obj) {
            const pretty = JSON.stringify(obj, null, 2);
            log.innerHTML = syntaxHighlight(pretty) + "\n\n" + log.innerHTML;
        }

        const ws = new WebSocket("ws://localhost:8766/ws");

        ws.onopen = () => console.log("Connected");
        ws.onmessage = (ev) => {
            try {
                const obj = JSON.parse(ev.data);
                appendJSON(obj);
            } catch {
                log.innerHTML = ev.data + "\n\n" + log.innerHTML;
            }
        };
        ws.onclose = () => console.log("Closed");
    </script>

</body>

</html>
